<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Türkiye hava durumu - Şehir ve ilçe bazlı anlık hava durumu bilgisi ve 7 günlük tahmin">
  <title>Hava Durumu | Türkiye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-animation"></div>
  <div class="container">
    <header>
      <h1>🌤️ Hava Durumu</h1>
      <p class="subtitle">Türkiye genelinde şehir ve ilçe bazlı hava durumu</p>
    </header>

    <div class="search-panel">
      <div class="select-group">
        <label for="city-select">Şehir</label>
        <select id="city-select">
          <option value="">Şehir seçin...</option>
        </select>
      </div>
      <div class="select-group">
        <label for="district-select">İlçe</label>
        <select id="district-select" disabled>
          <option value="">Önce şehir seçin...</option>
        </select>
      </div>
      <button id="search-btn" disabled>Hava Durumunu Göster</button>
    </div>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Hava durumu yükleniyor...</p>
    </div>

    <div id="weather-result" class="hidden">
      <div class="current-weather">
        <div class="weather-icon" id="weather-icon"></div>
        <div class="weather-info">
          <h2 id="location-name"></h2>
          <p class="weather-desc" id="weather-desc"></p>
          <div class="temp-main" id="temp-main"></div>
        </div>
        <div class="weather-details">
          <div class="detail-item">
            <span class="detail-label">Hissedilen</span>
            <span class="detail-value" id="feels-like"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Nem</span>
            <span class="detail-value" id="humidity"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Rüzgar</span>
            <span class="detail-value" id="wind"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">Yağış</span>
            <span class="detail-value" id="precipitation"></span>
          </div>
        </div>
      </div>

      <h3 class="forecast-title">7 Günlük Tahmin</h3>
      <div class="forecast-grid" id="forecast-grid"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
